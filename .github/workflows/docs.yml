name: Documentation

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: |
          pip install mkdocs-material
          npm install -g markdownlint-cli

      - name: Check GitHub readiness
        shell: pwsh
        run: ./scripts/check-github-readiness.ps1

      - name: Generate documentation
        shell: pwsh
        run: ./scripts/generate-docs.ps1

      - name: Lint Markdown
        run: markdownlint "**/*.md"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml "**/*.md"

      - name: Commit generated documentation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): update generated documentation [skip ci]"
          file_pattern: "README.md docs/**"

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
