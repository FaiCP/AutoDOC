name: Update README

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README
        shell: pwsh
        run: ./scripts/generate-docs.ps1

      - name: Commit updated README
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(docs): update generated README [skip ci]"
          file_pattern: "README.md docs/project-detection.json"
