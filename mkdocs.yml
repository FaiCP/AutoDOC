site_name: Auto Docs Template
site_description: Automated documentation system for GitHub repositories
# repo_url: configure after connecting a GitHub remote

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - API: api.md
  - Stack Examples: stacks.md
  - Deployment: deployment.md
  - Troubleshooting: troubleshooting.md
  - Release Checklist: release-checklist.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true

